<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GenAI Assistant - An AI-powered chat assistant using Retrieval-Augmented Generation for grounded, accurate responses.">
    <title>GenAI Assistant — RAG-Powered Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- ─── Ambient Background Orbs ───────────────────────── -->
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>

        <!-- ─── Main Chat Container ──────────────────────────── -->
        <div class="chat-container" id="chatContainer">
            <!-- Header -->
            <header class="chat-header">
                <div class="header-left">
                    <div class="logo-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                            <path d="M2 17l10 5 10-5"/>
                            <path d="M2 12l10 5 10-5"/>
                        </svg>
                    </div>
                    <div class="header-info">
                        <h1>GenAI Assistant</h1>
                        <span class="header-subtitle">RAG-Powered </span>
                    </div>
                </div>
                <div class="header-right">
                    <div class="status-indicator" id="statusIndicator">
                        <span class="status-dot"></span>
                        <span class="status-text">Online</span>
                    </div>
                    <button class="btn-new-chat" id="newChatBtn" title="Start new conversation">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        New Chat
                    </button>
                </div>
            </header>

            <!-- Messages Area -->
            <main class="chat-messages" id="chatMessages">
                <!-- Welcome Message -->
                <div class="welcome-section" id="welcomeSection">
                    <div class="welcome-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                            <path d="M2 17l10 5 10-5"/>
                            <path d="M2 12l10 5 10-5"/>
                        </svg>
                    </div>
                    <h2>Welcome to GenAI Assistant</h2>
                    <p>I'm powered by Retrieval-Augmented Generation (RAG) to provide accurate, grounded answers from our knowledge base.</p>
                    <div class="suggestion-chips">
                        <button class="chip" data-query="How can I reset my password?">🔑 Reset password</button>
                        <button class="chip" data-query="What subscription plans are available?">💳 Subscription plans</button>
                        <button class="chip" data-query="How do I enable two-factor authentication?">🔒 Enable 2FA</button>
                        <button class="chip" data-query="How can I export my data?">📦 Data export</button>
                    </div>
                </div>
            </main>

            <!-- Input Area -->
            <footer class="chat-input-area">
                <div class="input-container">
                    <textarea
                        id="messageInput"
                        placeholder="Ask a question about our documentation..."
                        rows="1"
                        maxlength="4096"
                        aria-label="Message input"
                    ></textarea>
                    <button class="btn-send" id="sendBtn" title="Send message" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
                <div class="input-footer">
                    <span class="footer-text">Powered by RAG + Google Gemini</span>
                    <span class="token-counter" id="tokenCounter"></span>
                </div>
            </footer>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
